version: "3.9"

services:
  # ── PostgreSQL 15 + PostGIS 3.3 ───────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ap_map_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ap_election_map
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ap_election_map"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ap_map_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Martin Vector Tile Server ─────────────────────────────────────────────
  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: ap_map_martin
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/ap_election_map
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: --config /config.yaml
    volumes:
      - ./docker/martin.yaml:/config.yaml:ro

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ap_map_backend
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         4000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/ap_election_map
      REDIS_URL:    redis://redis:6379
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: ap_map_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ap_map_network
